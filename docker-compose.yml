services:
  db:
    image: mysql:8.4
    container_name: nikkei_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nikkei_trade
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
